<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Airplane Expenses</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
</head>
<body class="bg-slate-50">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function ExpenseSplitterApp() {
      // --- State Management ---
      const [activeTab, setActiveTab] = useState('people');
      const [tripName, setTripName] = useState('June 2026'); // Represents Month, Year
      const [people, setPeople] = useState([]);
      const [expenses, setExpenses] = useState([]);
      const [pastTrips, setPastTrips] = useState([]); // Array tracking archived snapshots
      
      // Form Input States
      const [newPersonName, setNewPersonName] = useState('');
      const [description, setDescription] = useState('');
      const [location, setLocation] = useState('');
      const [amount, setAmount] = useState('');
      const [paidBy, setPaidBy] = useState('');
      const [expenseDate, setExpenseDate] = useState(() => {
        const today = new Date();
        return today.toISOString().split('T')[0];
      });
      const [splitWith, setSplitWith] = useState([]);

      // --- Persistence Layer ---
      useEffect(() => {
        const savedTripName = localStorage.getItem('splitter_trip_name');
        const savedPeople = localStorage.getItem('splitter_people');
        const savedExpenses = localStorage.getItem('splitter_expenses');
        const savedPastTrips = localStorage.getItem('splitter_past_trips');
        
        if (savedTripName) setTripName(savedTripName);
        if (savedPeople) setPeople(JSON.parse(savedPeople));
        if (savedExpenses) setExpenses(JSON.parse(savedExpenses));
        if (savedPastTrips) setPastTrips(JSON.parse(savedPastTrips));
      }, []);

      useEffect(() => {
        localStorage.setItem('splitter_trip_name', tripName);
      }, [tripName]);

      useEffect(() => {
        localStorage.setItem('splitter_people', JSON.stringify(people));
      }, [people]);

      useEffect(() => {
        localStorage.setItem('splitter_expenses', JSON.stringify(expenses));
      }, [expenses]);

      useEffect(() => {
        localStorage.setItem('splitter_past_trips', JSON.stringify(pastTrips));
      }, [pastTrips]);

      // --- Actions ---
      const handleAddPerson = (e) => {
        e.preventDefault();
        if (!newPersonName.trim()) return;
        const newPerson = { id: crypto.randomUUID(), name: newPersonName.trim() };
        setPeople([...people, newPerson]);
        setNewPersonName('');
      };

      const handleAddExpense = (e) => {
        e.preventDefault();
        if (!description.trim() || !amount || !paidBy || splitWith.length === 0 || !expenseDate) {
          alert('Please fill out all fields, pick a date, and select who is splitting.');
          return;
        }

        const formattedDate = new Date(expenseDate + 'T00:00:00').toLocaleDateString(undefined, {
          weekday: 'short', month: 'short', day: 'numeric'
        });

        const newExpense = {
          id: crypto.randomUUID(),
          description: description.trim(),
          location: location.trim(),
          amount: parseFloat(amount),
          paidById: paidBy,
          splitWithIds: splitWith,
          date: formattedDate
        };

        setExpenses([...expenses, newExpense]);
        setDescription(''); setLocation(''); setAmount(''); setPaidBy(''); setSplitWith([]);
        setExpenseDate(new Date().toISOString().split('T')[0]);
      };

      const handleRemoveExpense = (expenseId) => {
        if (window.confirm("Are you sure you want to delete this expense?")) {
          setExpenses(expenses.filter(exp => exp.id !== expenseId));
        }
      };

      const handleStartNewTrip = () => {
        if (window.confirm("Are you sure you want to clear this sheet? This will permanently delete all unsaved active data.")) {
          resetActiveWorkspace();
          setActiveTab('people');
        }
      };

      const resetActiveWorkspace = () => {
        setTripName('June 2026');
        setPeople([]);
        setExpenses([]);
        setNewPersonName('');
        setDescription(''); setLocation(''); setAmount(''); setPaidBy(''); setSplitWith([]);
        setExpenseDate(new Date().toISOString().split('T')[0]);
      };

      // --- Past Trips Archive Engine ---
      const handleSaveCurrentTrip = () => {
        if (people.length === 0 && expenses.length === 0) {
          alert("There is no data to save yet. Add people or expenses first.");
          return;
        }

        const timestamp = new Date().toLocaleDateString(undefined, {
          month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit'
        });

        const newArchiveRecord = {
          id: crypto.randomUUID(),
          tripName: tripName,
          savedAt: timestamp,
          people: [...people],
          expenses: [...expenses]
        };

        const matchingIndex = pastTrips.findIndex(t => t.tripName.toLowerCase() === tripName.toLowerCase());
        if (matchingIndex !== -1) {
          if (window.confirm(`A past record for "${tripName}" already exists. Do you want to update/overwrite that saved file?`)) {
            const updatedHistory = [...pastTrips];
            updatedHistory[matchingIndex] = newArchiveRecord;
            setPastTrips(updatedHistory);
            alert("Record saved and updated successfully.");
            return;
          }
        }

        setPastTrips([newArchiveRecord, ...pastTrips]);
        alert("Record successfully saved to archives.");
      };

      const handleLoadPastTrip = (archive) => {
        if (people.length > 0 || expenses.length > 0) {
          if (!window.confirm("Loading an archived record will overwrite your current active workspace data. Continue?")) {
            return;
          }
        }
        setTripName(archive.tripName);
        setPeople(archive.people || []);
        setExpenses(archive.expenses || []);
        setActiveTab('balances');
        alert(`Loaded "${archive.tripName}" into workspace.`);
      };

      const handleDeletePastTrip = (archiveId, e) => {
        e.stopPropagation();
        if (window.confirm("Are you sure you want to permanently delete this backup?")) {
          setPastTrips(pastTrips.filter(t => t.id !== archiveId));
        }
      };

      // --- Excel/CSV Generation and Email Logic ---
      const handleEmailResults = () => {
        if (people.length === 0) {
          alert("Add people and expenses to generate a statement.");
          return;
        }

        const escapeCSV = (str) => {
          if (!str) return '';
          const text = str.toString();
          if (text.includes(',') || text.includes('"') || text.includes('\n')) {
            return `"${text.replace(/"/g, '""')}"`;
          }
          return text;
        };

        let csvContent = `AIRPLANE EXPENSES SUMMARY: ${tripName}\n\n`;

        // Section A: Individual Standings
        csvContent += `INDIVIDUAL STANDINGS\n`;
        csvContent += `Name,Status,Amount\n`;
        people.forEach(p => {
          const bal = currentBalances[p.id] || 0;
          const status = bal >= 0 ? "Gets Back" : "Owes Total";
          csvContent += `${escapeCSV(p.name)},${status},$${Math.abs(bal).toFixed(2)}\n`;
        });
        csvContent += `\n`;

        // Section B: Required Settlements
        csvContent += `REQUIRED SETTLEMENTS\n`;
        csvContent += `From (Ower),To (Recipient),Amount To Pay\n`;
        if (expenses.length === 0) {
          csvContent += `No expenses logged,,-\n`;
        } else if (transfersList.length === 0) {
          csvContent += `All accounts perfectly even,,🎉\n`;
        } else {
          transfersList.forEach(trans => {
            csvContent += `${escapeCSV(trans.from)},${escapeCSV(trans.to)},$${trans.amount.toFixed(2)}\n`;
          });
        }
        csvContent += `\n`;

        // Section C: Itemized Transaction Logs
        csvContent += `ITEMIZED TRANSACTION LOG\n`;
        csvContent += `Index,Date,Description,Where,Total Cost,Paid By,Split Count\n`;
        if (expenses.length === 0) {
          csvContent += `-,No records logged,,,0,,-\n`;
        } else {
          expenses.forEach((exp, idx) => {
            const payerName = people.find(p => p.id === exp.paidById)?.name || 'Someone';
            csvContent += `${idx + 1},${escapeCSV(exp.date)},${escapeCSV(exp.description)},${escapeCSV(exp.location)},$${exp.amount.toFixed(2)},${escapeCSV(payerName)},${exp.splitWithIds.length}\n`;
          });
        }

        const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: 'text/csv;charset=utf-8;' });
        const cleanFileName = tripName.replace(/[^a-z0-9]/gi, '_').toLowerCase();
        const finalFileName = `airplane_expenses_${cleanFileName || 'report'}.csv`;

        const link = document.createElement("a");
        if (link.download !== undefined) {
          const url = URL.createObjectURL(blob);
          link.setAttribute("href", url);
          link.setAttribute("download", finalFileName);
          link.style.visibility = 'hidden';
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        }

        const emailSubject = `Airplane Expenses Sheet & Logs: ${tripName}`;
        const emailBody = `Hello!\n\nI have compiled our log records into an Excel-friendly spreadsheet file.\n\nIt has automatically downloaded to your device as: "${finalFileName}". Please attach it to this email draft before sending.\n\nSent via Airplane Expenses App`;

        window.location.href = `mailto:?subject=${encodeURIComponent(emailSubject)}&body=${encodeURIComponent(emailBody)}`;
      };

      const toggleSplitUser = (personId) => {
        setSplitWith(splitWith.includes(personId) ? splitWith.filter(id => id !== personId) : [...splitWith, personId]);
      };

      const toggleSelectAll = () => {
        setSplitWith(splitWith.length === people.length ? [] : people.map(p => p.id));
      };

      // --- Calculations ---
      const calculateBalances = () => {
        const balances = {};
        people.forEach(p => { balances[p.id] = 0; });
        expenses.forEach(exp => {
          const payerId = exp.paidById;
          const share = exp.amount / (exp.splitWithIds.length || 1);
          if (balances[payerId] !== undefined) balances[payerId] += exp.amount;
          exp.splitWithIds.forEach(id => { if (balances[id] !== undefined) balances[id] -= share; });
        });
        return balances;
      };

      const currentBalances = calculateBalances();

      const calculateTransfers = () => {
        const balances = { ...currentBalances };
        const debtors = [], creditors = [];
        Object.keys(balances).forEach(id => {
          const person = people.find(p => p.id === id);
          if (!person) return;
          if (balances[id] < -0.01) debtors.push({ name: person.name, amount: Math.abs(balances[id]) });
          else if (balances[id] > 0.01) creditors.push({ name: person.name, amount: balances[id] });
        });

        const transfers = [];
        let d = 0, c = 0;
        while (d < debtors.length && c < creditors.length) {
          const amt = Math.min(debtors[d].amount, creditors[c].amount);
          if (amt > 0.01) transfers.push({ from: debtors[d].name, to: creditors[c].name, amount: amt });
          debtors[d].amount -= amt; creditors[c].amount -= amt;
          if (debtors[d].amount <= 0.01) d++;
          if (creditors[c].amount <= 0.01) c++;
        }
        return transfers;
      };

      const transfersList = calculateTransfers();

      return (
        <div className="max-w-md mx-auto min-h-screen bg-slate-50 flex flex-col font-sans select-none pb-24">
          {/* Header */}
          <header className="bg-indigo-600 text-white p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center">
            <div className="w-16"></div>
            <h1 className="text-xl font-bold tracking-tight text-center flex-grow">Airplane Expenses</h1>
            <button
              onClick={handleStartNewTrip}
              className="bg-rose-500 hover:bg-rose-600 active:bg-rose-700 text-[10px] font-bold px-2.5 py-1.5 rounded-lg shadow-sm border border-rose-400 shrink-0"
            >
              Start New
            </button>
          </header>

          {/* Navigation */}
          <nav className="flex justify-center space-x-1 p-3 bg-white border-b shadow-sm overflow-x-auto shrink-0">
            {['people', 'expenses', 'balances', 'history'].map(tab => (
              <button
                key={tab}
                onClick={() => setActiveTab(tab)}
                className={`flex-1 min-w-[76px] py-2 rounded-lg text-[11px] font-bold uppercase tracking-wider transition-all ${
                  activeTab === tab ? 'bg-indigo-600 text-white shadow-sm' : 'bg-white text-slate-500 border border-slate-200'
                }`}
              >
                {tab === 'history' ? 'Past Sheets' : tab}
              </button>
            ))}
          </nav>

          {/* Main Content Workspace */}
          <main className="p-4 flex-grow">
            
            {/* --- PEOPLE VIEW --- */}
            {activeTab === 'people' && (
              <div className="space-y-4">
                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm space-y-2">
                  <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider">Month, Year</label>
                  <input
                    type="text"
                    value={tripName}
                    onChange={(e) => setTripName(e.target.value)}
                    placeholder="E.g., June 2026"
                    className="w-full px-3 py-2 border border-slate-200 font-bold rounded-lg text-base text-slate-800 bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                  />
                </div>

                <form onSubmit={handleAddPerson} className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm space-y-3">
                  <h2 className="text-sm font-bold text-slate-700 uppercase tracking-wider">Add Group Member</h2>
                  <div className="flex gap-2">
                    <input
                      type="text"
                      placeholder="Enter name..."
                      value={newPersonName}
                      onChange={(e) => setNewPersonName(e.target.value)}
                      className="flex-grow px-3 py-2 border rounded-lg text-sm bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                    />
                    <button type="submit" className="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 rounded-lg transition-colors">Add</button>
                  </div>
                </form>

                <div className="bg-white rounded-xl border border-slate-200 divide-y divide-slate-100 shadow-sm">
                  {people.length === 0 ? (
                    <p className="text-xs text-center text-slate-400 py-8">No names added yet.</p>
                  ) : (
                    people.map(p => (
                      <div key={p.id} className="p-3 flex justify-between items-center">
                        <span className="text-sm font-medium text-slate-700">{p.name}</span>
                        <button 
                          onClick={() => { setPeople(people.filter(item => item.id !== p.id)); setExpenses(expenses.filter(e => e.paidById !== p.id)); }}
                          className="text-xs font-semibold text-rose-500 px-2 py-1"
                        >
                          Remove
                        </button>
                      </div>
                    ))
                  )}
                </div>
              </div>
            )}

            {/* --- EXPENSES VIEW --- */}
            {activeTab === 'expenses' && (
              <div className="space-y-4">
                <form onSubmit={handleAddExpense} className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm space-y-3">
                  <h2 className="text-sm font-bold text-slate-700 uppercase tracking-wider">Add Expense</h2>
                  
                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wide mb-1">Description</label>
                      <input type="text" placeholder="" value={description} onChange={(e) => setDescription(e.target.value)} className="w-full px-3 py-2 border rounded-lg text-sm bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                    </div>
                    <div>
                      <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wide mb-1">Where</label>
                      <input type="text" placeholder="" value={location} onChange={(e) => setLocation(e.target.value)} className="w-full px-3 py-2 border rounded-lg text-sm bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                    </div>
                  </div>

                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wide mb-1">Cost</label>
                      <div className="relative">
                        <span className="absolute left-3 top-2 text-slate-400 text-sm">$</span>
                        <input
                          type="number" inputMode="decimal" placeholder="0.00" value={amount} onChange={(e) => setAmount(e.target.value)}
                          className="w-full pl-7 pr-3 py-2 border rounded-lg text-sm bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none"
                        />
                      </div>
                    </div>
                    <div>
                      <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wide mb-1">Date</label>
                      <input type="date" value={expenseDate} onChange={(e) => setExpenseDate(e.target.value)} className="w-full px-3 py-2 border rounded-lg text-sm bg-slate-50 text-slate-700" />
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-medium text-slate-500 mb-1">Paid By:</label>
                    <select value={paidBy} onChange={(e) => setPaidBy(e.target.value)} className="w-full px-3 py-2 border rounded-lg text-sm bg-slate-50">
                      <option value="">Select payer...</option>
                      {people.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                    </select>
                  </div>

                  <div>
                    <div className="flex justify-between items-center mb-1">
                      <label className="text-xs font-medium text-slate-500">Split With:</label>
                      {people.length > 0 && <button type="button" onClick={toggleSelectAll} className="text-xs font-bold text-indigo-600 px-2 py-0.5">{splitWith.length === people.length ? 'Clear All' : '[All]'}</button>}
                    </div>
                    <div className="flex flex-wrap gap-1.5 p-1 border rounded-lg bg-slate-50 max-h-24 overflow-y-auto">
                      {people.map(p => {
                        const sel = splitWith.includes(p.id);
                        return (
                          <button
                            type="button" key={p.id} onClick={() => toggleSplitUser(p.id)}
                            className={`px-2.5 py-1 rounded-md text-xs font-medium border transition-all ${sel ? 'bg-indigo-50 text-indigo-700 border-indigo-300 ring-1 ring-indigo-300' : 'bg-white text-slate-600 border-slate-200'}`}
                          >
                            {p.name}
                          </button>
                        );
                      })}
                    </div>
                  </div>

                  <button type="submit" className="w-full bg-indigo-600 text-white text-sm font-semibold py-2 rounded-lg shadow mt-2">Log Expense</button>
                </form>

                <div className="space-y-2">
                  <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider pl-1">Activity Log</h3>
                  {expenses.length === 0 ? (
                    <p className="text-xs text-center text-slate-400 py-6 bg-white rounded-xl border border-dashed">No expenses logged.</p>
                  ) : (
                    [...expenses].reverse().map(exp => (
                      <div key={exp.id} className="bg-white p-3 rounded-xl border border-slate-200 flex justify-between items-center shadow-sm">
                        <div className="flex-grow pr-2">
                          <p className="text-sm font-semibold text-slate-800">
                            {exp.description} {exp.location && <span className="text-xs font-normal text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded">@ {exp.location}</span>}
                          </p>
                          <p className="text-xs text-slate-400">{exp.date} • Paid by {people.find(p => p.id === exp.paidById)?.name || 'Someone'} • Split ({exp.splitWithIds.length})</p>
                        </div>
                        <div className="flex items-center gap-3">
                          <span className="text-sm font-bold text-slate-900">${exp.amount.toFixed(2)}</span>
                          <button onClick={() => handleRemoveExpense(exp.id)} className="text-rose-500 p-1">
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                          </button>
                        </div>
                      </div>
                    ))
                  )}
                </div>
              </div>
            )}

            {/* --- BALANCES & SETTLEMENTS VIEW --- */}
            {activeTab === 'balances' && (
              <div className="space-y-5">
                <div className="space-y-2">
                  <h2 className="text-xs font-bold text-slate-400 uppercase tracking-wider pl-1">Standings ({tripName})</h2>
                  <div className="bg-white rounded-xl border border-slate-200 divide-y divide-slate-100 shadow-sm">
                    {people.length === 0 ? <p className="text-xs text-center text-slate-400 py-8">Add members to see individual totals.</p> : (
                      people.map(p => {
                        const bal = currentBalances[p.id] || 0;
                        return (
                          <div key={p.id} className="p-3.5 flex justify-between items-center">
                            <span className="text-sm font-semibold text-slate-700">{p.name}</span>
                            <div className="text-right">
                              <span className={`text-sm font-bold ${bal >= 0 ? 'text-emerald-600' : 'text-rose-600'}`}>{bal >= 0 ? `+$${bal.toFixed(2)}` : `-$${Math.abs(bal).toFixed(2)}`}</span>
                              <p className="text-[10px] text-slate-400 font-medium">{bal >= 0 ? 'Gets back' : 'Owes total'}</p>
                            </div>
                          </div>
                        );
                      })
                    )}
                  </div>
                </div>

                <div className="space-y-2">
                  <h2 className="text-xs font-bold text-slate-400 uppercase tracking-wider pl-1">Settlements</h2>
                  <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm space-y-2.5">
                    {expenses.length === 0 ? <p className="text-xs text-center text-slate-400 py-4">No balances recorded.</p> : transfersList.length === 0 ? <p className="text-xs text-center text-emerald-600 font-semibold py-4">All accounts are even! 🎉</p> : (
                      transfersList.map((trans, idx) => (
                        <div key={idx} className="flex justify-between items-center bg-slate-50 px-3 py-2.5 rounded-lg text-sm border border-slate-100">
                          <div className="text-slate-600"><span className="font-bold text-slate-800">{trans.from}</span> owes <span className="font-bold text-slate-800">{trans.to}</span></div>
                          <div className="font-extrabold text-indigo-600">${trans.amount.toFixed(2)}</div>
                        </div>
                      ))
                    )}
                  </div>
                </div>

                <div className="pt-2">
                  <button onClick={handleEmailResults} className="w-full bg-emerald-600 text-white font-bold text-sm py-3 rounded-xl shadow flex items-center justify-center gap-2">
                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" /></svg>
                    Export Spreadsheet & Email
                  </button>
                </div>
              </div>
            )}

            {/* --- PAST TRIPS ARCHIVE VIEW --- */}
            {activeTab === 'history' && (
              <div className="space-y-4">
                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm space-y-3">
                  <h2 className="text-sm font-bold text-slate-700 uppercase tracking-wider">Storage Operations</h2>
                  <p className="text-xs text-slate-500 leading-relaxed">Save a snapshot of your currently open workspace ("<strong>{tripName}</strong>") down to your phone storage so you can easily reference or pull it back up down the road.</p>
                  
                  <button
                    onClick={handleSaveCurrentTrip}
                    className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs py-2.5 rounded-lg shadow transition-colors flex items-center justify-center gap-2"
                  >
                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0111.186 0z" /></svg>
                    Save Current Sheet to Archives
                  </button>
                </div>

                <div className="space-y-2">
                  <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider pl-1">Saved Backups Index</h3>
                  
                  {pastTrips.length === 0 ? (
                    <div className="bg-white p-8 border border-dashed rounded-xl text-center text-xs text-slate-400">
                      No archived records found on this device.
                    </div>
                  ) : (
                    pastTrips.map(trip => (
                      <div
                        key={trip.id}
                        onClick={() => handleLoadPastTrip(trip)}
                        className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:border-indigo-400 transition-all cursor-pointer flex justify-between items-center group"
                      >
                        <div className="space-y-1">
                          <h4 className="text-sm font-bold text-slate-800 group-hover:text-indigo-600 transition-colors">{trip.tripName}</h4>
                          <p className="text-[11px] text-slate-400">Saved: {trip.savedAt}</p>
                          <p className="text-[11px] font-medium text-slate-500">
                            {(trip.people || []).length} People • {(trip.expenses || []).length} Expenses
                          </p>
                        </div>

                        <div className="flex items-center gap-2">
                          <span className="text-[10px] font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded group-hover:bg-indigo-600 group-hover:text-white transition-colors">
                            Load
                          </span>
                          <button
                            onClick={(e) => handleDeletePastTrip(trip.id, e)}
                            className="p-2 text-slate-300 hover:text-rose-600 transition-colors rounded"
                            title="Delete permanently"
                          >
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                          </button>
                        </div>
                      </div>
                    ))
                  )}
                </div>
              </div>
            )}

          </main>

          {/* Sticky Footer Panel */}
          <footer className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-slate-200 flex justify-around py-2 shadow-[0_-2px_10px_rgba(0,0,0,0.03)] z-50">
            <button onClick={() => setActiveTab('people')} className={`flex flex-col items-center gap-0.5 text-[10px] font-bold ${activeTab === 'people' ? 'text-indigo-600' : 'text-slate-400'}`}>
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
              People
            </button>

            <button onClick={() => setActiveTab('expenses')} className={`flex flex-col items-center gap-0.5 text-[10px] font-bold ${activeTab === 'expenses' ? 'text-indigo-600' : 'text-slate-400'}`}>
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" /></svg>
              Expenses
            </button>
            
            <button onClick={() => setActiveTab('balances')} className={`flex flex-col items-center gap-0.5 text-[10px] font-bold ${activeTab === 'balances' ? 'text-indigo-600' : 'text-slate-400'}`}>
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2z" /></svg>
              Balances
            </button>

            <button onClick={() => setActiveTab('history')} className={`flex flex-col items-center gap-0.5 text-[10px] font-bold ${activeTab === 'history' ? 'text-indigo-600' : 'text-slate-400'}`}>
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
              Past Sheets
            </button>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ExpenseSplitterApp />);
  </script>
</body>
</html>
